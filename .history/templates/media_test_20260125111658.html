<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>素材上传/获取测试</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.6; }
    .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; margin-bottom: 16px; max-width: 640px; }
    label { display: block; margin: 8px 0 4px; font-weight: 600; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 16px; margin-top: 12px; cursor: pointer; }
    pre { background: #f7f7f7; padding: 12px; border-radius: 6px; overflow-x: auto; }
    .row { display: flex; gap: 12px; align-items: center; }
    .row input { flex: 1; }
  </style>
</head>
<body>
  <h1>素材上传/获取测试</h1>
  <div class="card">
    <h3>上传临时素材</h3>
    <label>corp_id（可选，留空则用数据库首条 corp_auth）</label>
    <input id="corpId" placeholder="corp_id">
    <label>access_token（可选，优先级高于 corp_id）</label>
    <input id="token" placeholder="access_token">
    <label>素材类型</label>
    <select id="mediaType">
      <option value="file">file</option>
      <option value="image">image</option>
      <option value="voice">voice</option>
      <option value="video">video</option>
    </select>
    <label>选择文件</label>
    <input id="fileInput" type="file">
    <button id="uploadBtn">上传</button>
    <pre id="uploadResult">等待上传...</pre>
  </div>

  <div class="card">
    <h3>获取临时素材</h3>
    <label>media_id</label>
    <input id="mediaId" placeholder="上传后自动填充">
    <label>Range（可选，例如 bytes=0-20971519）</label>
    <input id="rangeHeader" placeholder="bytes=0-20971519">
    <button id="downloadBtn">获取并预览/下载</button>
    <div id="preview"></div>
  </div>

  <script>
    const uploadBtn = document.getElementById('uploadBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const uploadResult = document.getElementById('uploadResult');
    const preview = document.getElementById('preview');

    uploadBtn.onclick = async () => {
      uploadResult.textContent = '上传中...';
      const file = document.getElementById('fileInput').files[0];
      if (!file) { uploadResult.textContent = '请先选择文件'; return; }
      const mediaType = document.getElementById('mediaType').value;
      const token = document.getElementById('token').value.trim();
      const corpId = document.getElementById('corpId').value.trim();
      const form = new FormData();
      form.append('file', file);
      form.append('type', mediaType);
      if (token) form.append('access_token', token);
      if (corpId) form.append('corp_id', corpId);
      try {
        const resp = await fetch('/api/media/upload_temp', { method: 'POST', body: form });
        const data = await resp.json();
        uploadResult.textContent = JSON.stringify(data, null, 2);
        if (data.data && data.data.media_id) {
          document.getElementById('mediaId').value = data.data.media_id;
        }
      } catch (e) {
        uploadResult.textContent = '上传失败: ' + e;
      }
    };

    downloadBtn.onclick = async () => {
      preview.innerHTML = '请求中...';
      const mediaId = document.getElementById('mediaId').value.trim();
      if (!mediaId) { preview.textContent = '请先填写 media_id'; return; }
      const token = document.getElementById('token').value.trim();
      const corpId = document.getElementById('corpId').value.trim();
      const range = document.getElementById('rangeHeader').value.trim();
      const params = new URLSearchParams({ media_id: mediaId });
      if (token) params.append('access_token', token);
      if (corpId) params.append('corp_id', corpId);
      if (range) params.append('range', range);
      const resp = await fetch('/api/media/get_temp?' + params.toString(), {
        headers: range ? { 'Range': range } : undefined
      });
      if (!resp.ok) {
        const txt = await resp.text();
        preview.textContent = '请求失败: ' + resp.status + ' ' + txt;
        return;
      }
      const ctype = resp.headers.get('Content-Type') || '';
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      if (ctype.startsWith('image/')) {
        preview.innerHTML = `<img src="${url}" style="max-width: 100%;" />`;
      } else {
        const filename = (resp.headers.get('Content-Disposition') || '').match(/filename="?([^";]+)/);
        const name = filename ? filename[1] : 'download.bin';
        preview.innerHTML = `<a download="${name}" href="${url}">下载文件 (${ctype || 'application/octet-stream'})</a>`;
      }
    };
  </script>
</body>
</html>
